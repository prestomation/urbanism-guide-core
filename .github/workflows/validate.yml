name: Validate

on:
  workflow_call:
    inputs:
      timezone:
        description: "Timezone for Hugo build"
        required: false
        type: string
        default: "America/Los_Angeles"
      hugo_version:
        description: "Hugo version"
        required: false
        type: string
        default: "0.147.0"
      run_timeline_validation:
        description: "Whether to run timeline validation"
        required: false
        type: boolean
        default: true
      run_link_validation:
        description: "Whether to run htmltest link validation"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: "validate-${{ github.ref }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: ${{ inputs.hugo_version }}
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Hugo modules
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: hugo mod tidy

      - name: Validate timeline order
        if: ${{ inputs.run_timeline_validation }}
        run: |
          if [ -f scripts/validate-timeline.py ]; then
            python3 scripts/validate-timeline.py
          elif [ -f data/timeline.yaml ]; then
            curl -fsSL https://raw.githubusercontent.com/prestomation/urbanism-guide-core/main/scripts/validate-timeline.py | python3
          fi

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: ${{ inputs.timezone }}
        run: hugo --gc --minify

      - name: Build search index with Pagefind
        run: npx pagefind --site public

      - name: Validate build output
        run: |
          PAGE_COUNT=$(find public -name "index.html" | wc -l)
          if [ "$PAGE_COUNT" -lt 3 ]; then
            echo "::error::Hugo built only $PAGE_COUNT pages — possible empty or broken build"
            exit 1
          fi
          echo "✅ Build output: $PAGE_COUNT pages"

      - name: Validate links
        if: ${{ inputs.run_link_validation }}
        run: |
          curl -sSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar xz -C /tmp
          /tmp/htmltest --conf .htmltest.yml
